<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RD Sharma Solutions Explorer</title>
  
  <!-- Premium Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">

  <style>
    /* ─── Premium Light Theme Tokens ────────────────────────────────────────── */
    :root {
      /* Colors */
      --bg-body: #F3F4F6;        /* Soft gray background for the app */
      --bg-surface: #FFFFFF;     /* Pure white for cards and sidebar */
      --bg-sidebar: #F9FAFB;     /* Very subtle off-white for sidebar */
      --bg-answer: #F8FAFC;      /* Slate 50 for answers */
      
      --border-light: #E5E7EB;   /* Gray 200 */
      --border-focus: #C7D2FE;   /* Indigo 200 */
      
      --text-main: #111827;      /* Gray 900 - High contrast text */
      --text-muted: #4B5563;     /* Gray 600 - Secondary text */
      --text-faint: #9CA3AF;     /* Gray 400 - Tertiary text */
      
      --primary: #4F46E5;        /* Indigo 600 */
      --primary-hover: #4338CA;  /* Indigo 700 */
      --primary-subtle: #EEF2FF; /* Indigo 50 */
      
      --success: #059669;        /* Emerald 600 */
      --success-subtle: #D1FAE5; /* Emerald 100 */
      
      /* Typography */
      --font-ui: 'Inter', system-ui, -apple-system, sans-serif;
      --font-reading: 'Lora', Georgia, serif; /* Better for reading long text/math */
      
      /* Layout & Shadows */
      --radius-md: 12px;
      --radius-lg: 16px;
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.025);
      
      --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ─── Global Reset ─────────────────────────────────────────────────── */
    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }

    body {
      font-family: var(--font-ui);
      background: var(--bg-body);
      color: var(--text-main);
      min-height: 100vh;
      display: grid;
      grid-template-columns: 300px 1fr;
      grid-template-rows: 70px 1fr;
      grid-template-areas: 
        "header header" 
        "sidebar main";
      height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ─── Header ───────────────────────────────────────────────────────── */
    header {
      grid-area: header;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border-light);
      display: flex;
      align-items: center;
      padding: 0 32px;
      gap: 24px;
      z-index: 100;
      box-shadow: var(--shadow-sm);
    }

    .logo {
      font-size: 20px; 
      font-weight: 800; 
      letter-spacing: -0.5px;
      color: var(--text-main); 
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo em { 
      color: var(--primary); 
      font-style: normal; 
    }

    .header-stats {
      display: flex; 
      gap: 12px; 
      margin-left: auto;
    }

    .stat-pill {
      font-size: 13px; 
      font-weight: 500;
      padding: 6px 14px; 
      border-radius: 20px;
      background: var(--bg-body);
      color: var(--text-muted);
      border: 1px solid var(--border-light);
    }

    .stat-pill b { 
      color: var(--text-main); 
      font-weight: 700;
    }

    .load-btn {
      background: linear-gradient(135deg, var(--primary), var(--primary-hover));
      color: #ffffff;
      border: none; 
      border-radius: 8px;
      padding: 10px 20px; 
      font-size: 14px; 
      font-weight: 600;
      cursor: pointer; 
      transition: var(--transition);
      box-shadow: 0 2px 4px rgba(79, 70, 229, 0.2);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .load-btn:hover { 
      transform: translateY(-1px);
      box-shadow: 0 4px 6px rgba(79, 70, 229, 0.3);
    }

    /* ─── Sidebar ──────────────────────────────────────────────────────── */
    aside {
      grid-area: sidebar;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border-light);
      display: flex; 
      flex-direction: column;
      overflow-y: auto;
    }

    .sidebar-search {
      padding: 20px;
      position: sticky; 
      top: 0; 
      background: var(--bg-sidebar); 
      z-index: 5;
      border-bottom: 1px solid var(--border-light);
    }

    .sidebar-search input {
      width: 100%;
      background: var(--bg-surface); 
      border: 1px solid var(--border-light);
      color: var(--text-main); 
      padding: 12px 16px; 
      border-radius: 8px;
      font-size: 14px; 
      outline: none;
      transition: var(--transition);
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.02);
    }

    .sidebar-search input:focus { 
      border-color: var(--primary); 
      box-shadow: 0 0 0 3px var(--primary-subtle);
    }

    .nav-tree { 
      flex: 1; 
      padding: 16px 12px; 
    }

    .nav-hint { 
      padding: 32px 24px; 
      font-size: 14px; 
      color: var(--text-muted); 
      text-align: center;
      line-height: 1.6;
    }

    .class-group {
      margin-bottom: 8px;
    }

    .class-btn {
      width: 100%; 
      text-align: left; 
      padding: 12px 16px;
      background: var(--bg-surface); 
      border: 1px solid var(--border-light); 
      border-radius: 8px;
      cursor: pointer;
      color: var(--text-main); 
      font-size: 14px; 
      font-weight: 700;
      display: flex; 
      align-items: center; 
      justify-content: space-between;
      transition: var(--transition);
      box-shadow: var(--shadow-sm);
    }

    .class-btn:hover { 
      border-color: var(--text-faint);
    }

    .class-arrow { 
      font-size: 10px; 
      color: var(--text-muted);
      transition: transform 0.2s ease; 
    }

    .class-btn.open .class-arrow { 
      transform: rotate(90deg); 
    }

    .chapter-list { 
      display: none; 
      padding: 8px 0 8px 12px;
    }

    .chapter-list.open { 
      display: block; 
    }

    .chapter-btn {
      width: 100%; 
      text-align: left; 
      padding: 10px 16px;
      margin-bottom: 2px;
      background: none; 
      border: none; 
      border-radius: 6px;
      cursor: pointer;
      color: var(--text-muted); 
      font-size: 14px; 
      line-height: 1.4;
      transition: var(--transition);
      display: flex; 
      align-items: flex-start; 
      gap: 12px;
    }

    .chapter-btn:hover { 
      background: var(--border-light); 
      color: var(--text-main); 
    }

    .chapter-btn.active {
      color: var(--primary); 
      background: var(--primary-subtle);
      font-weight: 600;
    }

    .ch-num {
      font-size: 12px; 
      color: var(--text-faint); 
      font-weight: 700;
      margin-top: 2px;
    }
    
    .chapter-btn.active .ch-num {
      color: var(--primary);
    }

    .ch-name { 
      flex: 1; 
    }

    /* ─── Main Content ─────────────────────────────────────────────────── */
    main {
      grid-area: main;
      overflow-y: auto;
      display: flex; 
      flex-direction: column;
      position: relative;
    }

    .welcome {
      flex: 1; 
      display: flex; 
      flex-direction: column;
      align-items: center; 
      justify-content: center;
      padding: 40px; 
    }

    .welcome-card {
      background: var(--bg-surface);
      padding: 48px;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      text-align: center;
      max-width: 500px;
      border: 1px solid var(--border-light);
    }

    .welcome-icon { 
      font-size: 56px; 
      margin-bottom: 16px;
    }

    .welcome h2 { 
      font-size: 24px; 
      color: var(--text-main); 
      font-weight: 800;
      margin-bottom: 12px;
    }

    .welcome p { 
      font-size: 15px; 
      color: var(--text-muted);
      line-height: 1.6; 
    }

    .chapter-header {
      padding: 40px 48px 24px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border-light);
      flex-shrink: 0;
    }

    .breadcrumb { 
      font-size: 13px; 
      font-weight: 600;
      color: var(--primary); 
      margin-bottom: 12px; 
    }

    .chapter-title { 
      font-size: 32px; 
      font-weight: 800; 
      line-height: 1.2; 
      color: var(--text-main);
      letter-spacing: -0.5px;
    }

    .filter-bar {
      padding: 16px 48px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-light);
      display: flex; 
      gap: 16px; 
      align-items: center; 
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .filter-bar input,
    .filter-bar select {
      background: var(--bg-surface); 
      border: 1px solid var(--border-light);
      color: var(--text-main); 
      padding: 10px 16px; 
      border-radius: 8px;
      font-size: 14px; 
      outline: none;
      transition: var(--transition);
    }

    .filter-bar input {
      flex: 1; 
      max-width: 400px;
    }

    .filter-bar input:focus,
    .filter-bar select:focus { 
      border-color: var(--primary); 
      box-shadow: 0 0 0 3px var(--primary-subtle);
    }

    .filter-bar select {
      cursor: pointer;
      font-weight: 500;
    }

    .q-count { 
      font-size: 14px; 
      font-weight: 600;
      color: var(--text-muted); 
      margin-left: auto;
    }

    /* ─── Question Cards ───────────────────────────────────────────────── */
    .questions-wrap { 
      padding: 32px 48px 80px; 
      max-width: 1000px; /* Limits width for comfortable reading */
      margin: 0 auto;
      width: 100%;
    }

    .exercise-heading {
      font-size: 18px; 
      font-weight: 800; 
      color: var(--text-main);
      padding: 32px 0 16px;
      margin-bottom: 16px;
      border-bottom: 2px solid var(--border-light);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .exercise-heading::before {
      content: '';
      display: block;
      width: 4px;
      height: 20px;
      background: var(--primary);
      border-radius: 2px;
    }

    .qa-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-md);
      margin-bottom: 24px;
      box-shadow: var(--shadow-md);
      transition: var(--transition);
      overflow: hidden;
    }

    .qa-card:hover { 
      border-color: #D1D5DB; 
      box-shadow: var(--shadow-lg);
    }

    .qa-top {
      padding: 24px;
      cursor: pointer;
      display: flex; 
      align-items: flex-start; 
      gap: 20px;
      user-select: none;
    }

    .q-badge {
      background: var(--bg-body); 
      color: var(--text-muted);
      border: 1px solid var(--border-light);
      font-size: 12px; 
      font-weight: 700;
      padding: 6px 12px; 
      border-radius: 6px;
      flex-shrink: 0; 
    }

    .q-body { 
      flex: 1; 
      min-width: 0; 
    }

    .q-text {
      font-size: 17px; 
      line-height: 1.7;
      font-family: var(--font-reading);
      color: var(--text-main);
      font-weight: 500;
      white-space: pre-wrap; /* Preserves mathematical spacing */
      word-break: break-word;
    }

    .q-chevron {
      color: var(--text-faint); 
      font-size: 20px; 
      flex-shrink: 0;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--bg-body);
    }

    .qa-card.open .q-badge {
      background: var(--primary-subtle);
      color: var(--primary);
      border-color: var(--primary-subtle);
    }

    .qa-card.open .q-chevron { 
      transform: rotate(180deg); 
      background: var(--primary-subtle);
      color: var(--primary);
    }

    .q-subparts { 
      margin-top: 16px; 
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .q-subpart {
      font-size: 16px; 
      color: var(--text-muted); 
      font-family: var(--font-reading);
      background: var(--bg-body);
      padding: 12px 16px;
      border-radius: 8px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .q-subpart .lbl { 
      color: var(--text-main); 
      font-weight: 700; 
      margin-right: 8px; 
      font-family: var(--font-ui);
    }

    /* ─── Answer Panel ─────────────────────────────────────────────────── */
    .answer-panel {
      display: none;
      background: var(--bg-answer);
      padding: 32px 24px 32px 88px; /* Indented to align with question text */
      border-top: 1px solid var(--border-light);
      position: relative;
    }

    /* Custom line to connect Q and A visually */
    .answer-panel::before {
      content: '';
      position: absolute;
      left: 50px;
      top: 0;
      bottom: 32px;
      width: 2px;
      background: var(--border-light);
    }

    .qa-card.open .answer-panel { 
      display: block; 
      animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .ans-label {
      font-size: 12px; 
      font-weight: 800; 
      letter-spacing: 1px;
      text-transform: uppercase; 
      color: var(--success); 
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-ui);
    }

    .ans-label svg {
      background: var(--success-subtle);
      border-radius: 50%;
      padding: 2px;
    }

    .ans-text {
      font-size: 16px; 
      line-height: 1.8; 
      color: var(--text-main);
      font-family: var(--font-reading); 
      white-space: pre-wrap; /* Crucial for multi-line math steps */
      word-break: break-word;
    }

    .ans-subparts { 
      margin-top: 24px; 
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .ans-subpart {
      font-size: 16px; 
      color: var(--text-muted); 
      font-family: var(--font-reading);
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border-light);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .ans-subpart:last-child { 
      border-bottom: none; 
      padding-bottom: 0;
    }

    .ans-subpart .lbl { 
      color: var(--text-main); 
      font-weight: 700; 
      margin-right: 8px; 
      font-family: var(--font-ui);
    }

    /* ─── Images & Lightbox ────────────────────────────────────────────── */
    .q-images { 
      margin-top: 20px; 
    }

    .img-grid {
      display: flex; 
      flex-wrap: wrap; 
      gap: 16px; 
    }

    .img-grid img {
      max-height: 280px; 
      max-width: 100%; 
      object-fit: contain;
      border-radius: 8px; 
      border: 1px solid var(--border-light);
      background: #ffffff; 
      cursor: zoom-in;
      transition: var(--transition);
      box-shadow: var(--shadow-sm);
      min-height: 40px;
      min-width: 40px;
    }

    .img-grid img:hover { 
      transform: translateY(-2px); 
      box-shadow: var(--shadow-md);
      border-color: var(--text-faint);
    }

    .empty-state {
      text-align: center; 
      padding: 80px 20px; 
      color: var(--text-muted);
      font-size: 16px;
    }

    .empty-state .ico { 
      font-size: 48px; 
      margin-bottom: 16px; 
    }

    #lb {
      display: none; 
      position: fixed; 
      inset: 0;
      background: rgba(17, 24, 39, 0.95); /* Gray 900 */
      backdrop-filter: blur(8px);
      z-index: 9999;
      align-items: center; 
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    #lb.on { 
      display: flex; 
      opacity: 1;
    }

    #lb img {
      max-width: 90vw; 
      max-height: 90vh;
      border-radius: 8px; 
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      transform: scale(0.95);
      transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    #lb.on img {
      transform: scale(1);
    }

    #lb-x {
      position: fixed; 
      top: 24px; 
      right: 32px;
      color: #ffffff; 
      font-size: 32px; 
      cursor: pointer; 
      line-height: 1;
      opacity: 0.6; 
      transition: var(--transition);
      background: rgba(255,255,255,0.1);
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #lb-x:hover { 
      opacity: 1; 
      background: rgba(255,255,255,0.2);
      transform: rotate(90deg);
    }

    /* ─── Scrollbars ───────────────────────────────────────────────────── */
    ::-webkit-scrollbar { 
      width: 8px; 
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg-body);
    }
    ::-webkit-scrollbar-thumb { 
      background: #D1D5DB; 
      border-radius: 4px; 
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #9CA3AF;
    }

    /* ─── Responsive ───────────────────────────────────────────────────── */
    @media (max-width: 1024px) {
      .questions-wrap { padding: 32px; }
      .chapter-header { padding: 32px; }
      .filter-bar { padding: 16px 32px; }
    }

    @media (max-width: 768px) {
      body {
        grid-template-columns: 1fr;
        grid-template-rows: 70px auto 1fr;
        grid-template-areas: 
          "header" 
          "sidebar" 
          "main";
        height: auto; 
        overflow: auto;
      }
      
      aside { max-height: 300px; }
      
      header { padding: 0 20px; }
      .header-stats { display: none; } /* Hide stats on mobile to save space */
      
      .chapter-header { padding: 24px 20px; }
      .chapter-title { font-size: 24px; }
      
      .filter-bar { 
        padding: 16px 20px; 
        flex-direction: column;
        align-items: stretch;
      }
      
      .questions-wrap { padding: 20px; }
      .qa-top { padding: 16px; gap: 12px; }
      .q-text { font-size: 15px; }
      .answer-panel { padding: 24px 16px; }
      .answer-panel::before { display: none; }
    }
  </style>
</head>
<body>

  <!-- ─── Header ─── -->
  <header>
    <div class="logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
      RD <em>Sharma</em>
    </div>
    <div class="header-stats" id="hstats"></div>
    <label class="load-btn">
      <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
      Upload JSON
      <input type="file" id="fileInput" accept=".json" style="display:none">
    </label>
  </header>

  <!-- ─── Sidebar ─── -->
  <aside>
    <div class="sidebar-search">
      <input type="text" id="sideSearch" placeholder="Search chapters…" oninput="filterNav()">
    </div>
    <div class="nav-tree" id="navTree">
      <div class="nav-hint">
        <strong>Welcome to the Explorer</strong><br><br>
        Please upload your RD Sharma <code>.json</code> file using the button in the top right to begin.
      </div>
    </div>
  </aside>

  <!-- ─── Main Content ─── -->
  <main id="main">
    <div class="welcome" id="welcome">
      <div class="welcome-card">
        <div class="welcome-icon">📚</div>
        <h2>Ready to Study</h2>
        <p>Upload a structured JSON file containing classes, chapters, and questions to beautifully format and explore your study material.</p>
      </div>
    </div>
  </main>

  <!-- ─── Lightbox ─── -->
  <div id="lb">
    <span id="lb-x" onclick="closeLB()">✕</span>
    <img id="lb-img" src="" alt="Enlarged view">
  </div>

  <script>
    // ─── State Management ───────────────────────────────────────────
    let classes = [];
    let activeChap = null;
    let activeQs = [];

    // ─── File Loading & Core Logic ──────────────────────────────────
    window.addEventListener('DOMContentLoaded', async () => {
      try {
        const response = await fetch('./rd_sharma_master.json');
        const raw = await response.json();

        let statsData = {};

        if (raw.classes) {
            classes = raw.classes;

            // Sort classes: 6,7,8,9,10,11,12
            classes.sort((a, b) => Number(a.class) - Number(b.class));

            statsData = {
                clsCount: raw.total_classes || classes.length,
                chCount: raw.total_chapters || 0,
                qCount: raw.total_questions || 0
            };
          } else if (raw.class !== undefined && raw.chapters) {
          classes = [raw];
          statsData = {
            clsCount: 1,
            chCount: raw.chapters.length,
            qCount: raw.chapters.reduce(
              (sum, ch) => sum + (ch.questions || []).length,
              0
            )
          };
        }

        initApp(statsData);

      } catch (err) {
        console.error(err);
        alert("Failed to load JSON");
      }
    });

    function initAppStatsFallback() {
      const totalChapters = classes.reduce((sum, cls) => sum + cls.chapters.length, 0);
      const totalQuestions = classes.reduce((sum, cls) =>
        sum + cls.chapters.reduce((cSum, ch) => cSum + (ch.questions || []).length, 0), 0
      );

      const stats = document.getElementById('hstats');
      stats.innerHTML = `
        <div class="stat-pill"><b>${classes.length}</b> Class${classes.length > 1 ? 'es' : ''}</div>
        <div class="stat-pill"><b>${totalChapters}</b> Chapters</div>
        <div class="stat-pill"><b>${totalQuestions.toLocaleString()}</b> Qs</div>
      `;
    }
    function initApp(stats) {
        const statsEl = document.getElementById('hstats');

        statsEl.innerHTML = `
            <div class="stat-pill"><b>${stats.clsCount}</b> Class${stats.clsCount > 1 ? 'es' : ''}</div>
            <div class="stat-pill"><b>${stats.chCount}</b> Chapters</div>
            <div class="stat-pill"><b>${stats.qCount.toLocaleString()}</b> Qs</div>
        `;

        buildNav();

        const welcome = document.getElementById('welcome');
        if (welcome) {
            welcome.style.display = 'none';
        }
    }
    // ─── Sidebar Navigation ─────────────────────────────────────────
    function buildNav() {
      const tree = document.getElementById('navTree');
      tree.innerHTML = '';

      for (const cls of classes) {
        const group = document.createElement('div');
        group.className = 'class-group';

        const btn = document.createElement('button');
        btn.className = 'class-btn';
        btn.innerHTML = `<span>Class ${escapeHTML(cls.class)}</span><span class="class-arrow">▶</span>`;

        const list = document.createElement('div');
        list.className = 'chapter-list';

        btn.onclick = () => {
          btn.classList.toggle('open');
          list.classList.toggle('open');
        };

        cls.chapters.forEach((ch, idx) => {
          const chBtn = document.createElement('button');
          chBtn.className = 'chapter-btn';
          chBtn.dataset.search = formatShortName(ch).toLowerCase();

          const num = idx + 1;
          chBtn.innerHTML = `<span class="ch-num">${num}.</span><span class="ch-name">${escapeHTML(formatShortName(ch))}</span>`;
          chBtn.title = ch.chapter_name || ch.chapter || '';

          chBtn.onclick = () => {
            document.querySelectorAll('.chapter-btn').forEach(b => b.classList.remove('active'));
            chBtn.classList.add('active');
            loadChapter(cls, ch);
          };

          list.appendChild(chBtn);
        });

        group.appendChild(btn);
        group.appendChild(list);
        tree.appendChild(group);

        // Auto-open logic: open first class or if there's only one
        if (classes.length === 1 || classes.indexOf(cls) === 0) {
          btn.classList.add('open');
          list.classList.add('open');
        }
      }
      
      // Auto-load first chapter of first class
      if (classes[0] && classes[0].chapters[0]) {
         const firstChBtn = tree.querySelector('.chapter-btn');
         if (firstChBtn) firstChBtn.click();
      }
    }

    function filterNav() {
      const query = document.getElementById('sideSearch').value.toLowerCase();
      document.querySelectorAll('.chapter-btn').forEach(btn => {
        const match = !query || btn.dataset.search.includes(query);
        btn.style.display = match ? '' : 'none';
      });
      
      document.querySelectorAll('.class-group').forEach(group => {
        const hasVisible = Array.from(group.querySelectorAll('.chapter-btn')).some(b => b.style.display !== 'none');
        group.style.display = hasVisible ? '' : 'none';
        // Auto expand if searching
        if (query && hasVisible) {
           group.querySelector('.class-btn').classList.add('open');
           group.querySelector('.chapter-list').classList.add('open');
        }
      });
    }

    // ─── Chapter View & Filtering ───────────────────────────────────
    function loadChapter(cls, ch) {
      activeChap = ch;
      activeQs = ch.questions || [];

      const main = document.getElementById('main');
      const title = (ch.chapter_name || ch.chapter || '').replace(/RD Sharma Solutions (for )?/i, '').trim();

      const exercises = [...new Set(activeQs.map(q => q.exercise).filter(Boolean))];
      const exOptions = exercises.map(e => `<option value="${escapeHTML(e)}">${escapeHTML(e)}</option>`).join('');

      main.innerHTML = `
        <div class="chapter-header">
          <div class="breadcrumb">Class ${escapeHTML(cls.class)} • Mathematics</div>
          <div class="chapter-title">${escapeHTML(title)}</div>
        </div>
        <div class="filter-bar">
          <input type="text" id="qSearch" placeholder="Search in this chapter..." oninput="applyFilters()">
          <select id="exFilter" onchange="applyFilters()">
            <option value="">All Exercises</option>
            ${exOptions}
          </select>
          <span class="q-count" id="qCount">${activeQs.length} questions</span>
        </div>
        <div class="questions-wrap" id="qWrap"></div>
      `;

      applyFilters();
      // Scroll main to top
      main.scrollTop = 0;
    }

    function applyFilters() {
      const search = (document.getElementById('qSearch')?.value || '').toLowerCase();
      const exFilter = document.getElementById('exFilter')?.value || '';

      let filtered = activeQs;

      if (exFilter) {
        filtered = filtered.filter(q => q.exercise === exFilter);
      }

      if (search) {
        filtered = filtered.filter(q => {
          const haystack = [
            q.question,
            q.answer,
            ...(q.sub_parts || []).map(p => p.text),
            ...(q.answer_sub_parts || []).map(p => p.text),
          ].join(' ').toLowerCase();
          return haystack.includes(search);
        });
      }

      const countEl = document.getElementById('qCount');
      if (countEl) countEl.textContent = `${filtered.length} questions`;
      
      renderQuestions(filtered);
    }

    // ─── Rendering Questions ────────────────────────────────────────
    function renderQuestions(questions) {
      const wrap = document.getElementById('qWrap');
      if (!wrap) return;

      if (!questions.length) {
        wrap.innerHTML = `<div class="empty-state"><div class="ico">🔍</div>No questions match your search.</div>`;
        return;
      }

      let html = '';
      let lastEx = null;

      for (const q of questions) {
        if (q.exercise && q.exercise !== lastEx) {
          html += `<div class="exercise-heading">${escapeHTML(q.exercise)}</div>`;
          lastEx = q.exercise;
        }
        html += generateCardHTML(q);
      }

      wrap.innerHTML = html;

      // Card Accordion Logic
      wrap.querySelectorAll('.qa-top').forEach(top => {
        top.addEventListener('click', () => {
          top.closest('.qa-card').classList.toggle('open');
        });
      });

      // Lightbox Logic for newly rendered images
      wrap.querySelectorAll('.img-grid img').forEach(img => {
        img.addEventListener('click', (e) => {
          e.stopPropagation();
          openLB(img.src);
        });
      });
    }

    function generateCardHTML(q) {
      // Safely extract question number, default to '?' if missing
      let qNum = q.question_number || '?';
      if (qNum.toString().toLowerCase().includes('uestion')) {
        qNum = qNum.toString().replace(/uestion\s*/i, '').trim(); 
      }
      
      let rawQuestion = q.question || '';
      let rawAnswer = (q.answer || '').trim();

      // Clean up redundant "Question X:" text from the body to avoid repeating the badge
      const qPrefixRegex = new RegExp(`^Question\\s*(?:${qNum})?\\s*:\\s*`, 'i');
      rawQuestion = rawQuestion.replace(qPrefixRegex, '');

      // Split "Solution:" out of the question block if it's embedded in the text
      if (!rawAnswer) {
        const splitRegex = /(?:\n|^)\s*(Solution|Answer)\s*:\s*/i;
        const match = rawQuestion.match(splitRegex);
        
        if (match) {
          rawAnswer = rawQuestion.substring(match.index + match[0].length).trim();
          rawQuestion = rawQuestion.substring(0, match.index).trim();
        }
      }

      const qText = escapeHTML(rawQuestion);
      const ansText = escapeHTML(rawAnswer);

      const qSubs = (q.sub_parts || []).map(p => {
        const pText = escapeHTML((p.text || '').replace(p.label, '').trim());
        const pImgs = generateImgGrid(p.images || p.image || p.question_images);
        return `<div class="q-subpart">
                  <div><span class="lbl">${escapeHTML(p.label)}</span> ${pText}</div>
                  ${pImgs ? `<div class="q-images">${pImgs}</div>` : ''}
                </div>`;
      }).join('');

      const qImgs = generateImgGrid(q.question_images || q.images);

      const ansSubs = (q.answer_sub_parts || []).map(p => {
        const pText = escapeHTML((p.text || '').replace(p.label, '').trim());
        const pImgs = generateImgGrid(p.images || p.image || p.answer_images);
        return `<div class="ans-subpart">
                  <div><span class="lbl">${escapeHTML(p.label)}</span> ${pText}</div>
                  ${pImgs ? `<div class="q-images">${pImgs}</div>` : ''}
                </div>`;
      }).join('');
      
      const ansImgs = generateImgGrid(q.answer_images || q.images);

      const hasAnswer = ansText || ansSubs || ansImgs;

      return `
        <div class="qa-card">
          <div class="qa-top">
            <div class="q-badge">Q${escapeHTML(qNum)}</div>
            <div class="q-body">
              <div class="q-text">${qText}</div>
              ${qSubs ? `<div class="q-subparts">${qSubs}</div>` : ''}
              ${qImgs ? `<div class="q-images">${qImgs}</div>` : ''}
            </div>
            ${hasAnswer ? `<div class="q-chevron">▼</div>` : ''}
          </div>
          ${hasAnswer ? `
          <div class="answer-panel">
            <div class="ans-label">
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg>
              Solution
            </div>
            ${ansText ? `<div class="ans-text">${ansText}</div>` : ''}
            ${ansSubs ? `<div class="ans-subparts">${ansSubs}</div>` : ''}
            ${ansImgs ? ansImgs : ''}
          </div>` : ''}
        </div>
      `;
    }

    function generateImgGrid(urls) {
      if (!urls) return '';
      let urlArray = [];
      if (Array.isArray(urls)) {
        urlArray = urls;
      } else if (typeof urls === 'string') {
        urlArray = [urls];
      } else if (typeof urls === 'object') {
        urlArray = Object.values(urls);
      }
      
      const valid = urlArray.filter(u => typeof u === 'string' && u.trim() !== '');
      if (!valid.length) return '';
      return `
        <div class="img-grid">
          ${valid.map(u => `<img src="${escapeHTML(u.trim())}" alt="Figure">`).join('')}
        </div>
      `;
    }

    // ─── Lightbox Utility ───────────────────────────────────────────
    function openLB(src) {
      const lb = document.getElementById('lb');
      document.getElementById('lb-img').src = src;
      lb.classList.add('on');
    }

    function closeLB() {
      const lb = document.getElementById('lb');
      lb.classList.remove('on');
      setTimeout(() => { document.getElementById('lb-img').src = ''; }, 200);
    }

    document.getElementById('lb').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeLB();
    });

    document.addEventListener('keydown', (e) => { 
      if (e.key === 'Escape') closeLB(); 
    });

    // ─── String Formatting Helpers ──────────────────────────────────
    function formatShortName(ch) {
      return (ch.chapter_name || ch.chapter || '')
        .replace(/RD Sharma Solutions (for )?Class \d+ Maths\s*/i, '')
        .replace(/Chapter \d+\s*[–\-]\s*/i, '')
        .trim() || 'Chapter';
    }

    function escapeHTML(str) {
      return String(str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>
</body>
